{{ define "main" }}
<div class="masonry-grid" data-gap="{{ site.Params.gridGap | default 24 }}">
  {{- $works := where site.RegularPages "Section" "works" -}}
  {{- if $works -}}
    {{- range $works }}
    <div class="masonry-item">
      <a href="{{ .RelPermalink }}">
        <img src="{{ .Params.image | relURL }}" {{ with .Title }}alt="{{ . }}"{{ else }}alt=""{{ end }} loading="lazy" />
        {{- with .Title }}
        <div class="overlay">
          <span class="overlay-title">{{ . }}</span>
        </div>
        {{- end }}
      </a>
    </div>
    {{- end }}
  {{- else }}
    <p style="color: #999; font-size: 0.9rem;">No works yet. Add your works as Markdown files in <code>content/works/</code> to get started.</p>
  {{- end }}
</div>
{{ end }}
