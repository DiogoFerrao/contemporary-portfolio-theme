<header class="site-header">
  <div class="site-title">
    <a href="{{ "/" | relURL }}">{{ site.Params.artistName | default site.Title }}</a>
  </div>
  <nav class="site-nav">
    <ul>
      {{- range site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{- end }}
    </ul>
  </nav>
</header>
